<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konva tests</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #11111F;
	    color: #FAFAFF;
        }
        
        #container {
            border: 2px solid #333;
            margin: 20px auto;
            display: block;
            background-color: white;
        }
        
        h1 {
            text-align: center;
            color: #FAFAFF;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Konva tests</h1>
            
	<div class="layer-panel">
	    <h3>Layers</h3>
	    <div id="layers-list"></div>
	</div>

	<div id="stage-container"></div>
</div>

    <script src="./node_modules/konva/konva.min.js"></script>
    
    <script>
        const stage = new Konva.Stage({
            container: 'stage-container',
            width: 800,
            height: 600
        });

        const mainLayer = new Konva.Layer();
        stage.add(mainLayer);
	
        let layers = [];
        let selectedLayerId = null;
        let layerCounter = 0;

	function loadImageToPixels(file) {
	    return new Promise((resolve) => {
		const img = new Image();
		img.onload = () => {
		    const canvas = document.createElement('canvas');
		    const ctx = canvas.getContext('2d');
		    
		    canvas.width = img.width;
		    canvas.height = img.height;
		    
		    ctx.drawImage(img, 0, 0);
		    const imageData = ctx.getImageData(0, 0, img.width, img.height);
		    
		    resolve({
			pixels: Array.from(imageData.data), 
			width: img.width,
			height: img.height
		    });
		};
		img.src = URL.createObjectURL(file);
	    });
	}

        function createImageFromPixels(pixelArray, width, height) {
            return new Promise((resolve) => {
                // Create a temporary canvas
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                const imageData = new ImageData(new Uint8ClampedArray(pixelArray), width, height);
                ctx.putImageData(imageData, 0, 0);
                
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = canvas.toDataURL();
            });
        }

        async function createLayerFromPixels(pixelArray, width, height, name) {
            const img = await createImageFromPixels(pixelArray, width, height);
            
            const konvaImage = new Konva.Image({
                x: Math.random() * 200 + 50,
                y: Math.random() * 200 + 50,
                image: img,
                draggable: true
            });

            const layerId = `layer_${layerCounter++}`;
            const layerData = {
                id: layerId,
                name: name,
                konvaImage: konvaImage,
                pixelArray: [...pixelArray],
                width: width,
                height: height,
                visible: true
            };

            layers.push(layerData);
            mainLayer.add(konvaImage);
            
            updateLayersPanel();
            mainLayer.draw();
            
            return layerData;
        }

        function getSelectedLayer() {
            return layers.find(l => l.id === selectedLayerId);
        }

	function selectLayer(layerId) {
            selectedLayerId = layerId;
            updateLayersPanel();
            
            const layer = getSelectedLayer();
            if (layer) {
                document.getElementById('opacity').value = layer.konvaImage.opacity();
                document.getElementById('blendMode').value = layer.konvaImage.globalCompositeOperation() || 'source-over';
            }
        }

	
        function updateLayersPanel() {
            const layersList = document.getElementById('layers-list');
            layersList.innerHTML = '';
            
            layers.forEach(layer => {
                const layerItem = document.createElement('div');
                layerItem.className = `layer-item ${layer.id === selectedLayerId ? 'selected' : ''}`;
                layerItem.onclick = () => selectLayer(layer.id);
                
                layerItem.innerHTML = `
                    <div class="layer-preview"></div>
                    <span>${layer.name}</span>
                `;
                
                layersList.appendChild(layerItem);
            });
        }

	// Usage with file input
	function createFileInput() {
	    const fileInput = document.createElement('input');
	    fileInput.type = 'file';
	    fileInput.accept = 'image/*';
	    fileInput.style.margin = '10px';
	    
	    fileInput.onchange = async (e) => {
		const file = e.target.files[0];
		if (!file) return;
		
		const { pixels, width, height } = await loadImageToPixels(file);
		console.log(`Loaded ${width}x${height} image with ${pixels.length} values`);
		
		// Use with your existing createLayerFromPixels function
		await createLayerFromPixels(pixels, width, height, file.name);
	    };
	    
	    // Add to page
	    document.body.appendChild(fileInput);
	    return fileInput;
	}

	// Create and show the file input
	createFileInput();
	
    </script>
</body>
</html>
